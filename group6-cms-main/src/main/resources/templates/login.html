<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>CMS Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-page">

<div class="auth-card">

    <div class="auth-brand">Client Management System</div>

    <h1 class="auth-title">Sign In</h1>
    <p class="auth-subtitle">Use your email address or username to access the dashboard.</p>

    <div th:if="${error}" class="alert-error" th:text="${error}"></div>

    <form action="/login" method="post" class="stack-form">

        <div class="form-group">
            <label for="identifier">Email or Username</label>
            <input id="identifier"
                   class="form-input"
                   type="text"
                   name="identifier"
                   placeholder="Enter email or username"
                   required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input id="password"
                   class="form-input"
                   type="password"
                   name="password"
                   placeholder="Enter password"
                   required>
        </div>

        <button type="submit" class="btn">Login</button>

    </form>

    <div class="account-secondary">
        <p>Don't have an account?</p>
        <a href="/signup" class="text-link">Create Account</a>
    </div>

</div>

</body>
</html>
