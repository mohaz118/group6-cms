<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Add Customer</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="app-shell">

  <aside class="sidebar">
    <div class="brand">
      Broker Client Management System
      <div class="brand-subtext">Insurance brokerage dashboard</div>
    </div>

    <div class="sidebar-section-title">Navigation</div>
    <a th:href="@{/}" class="nav-link">Dashboard</a>
    <a th:href="@{/customers}" class="nav-link active">Customers</a>
    <a th:href="@{/agents}" class="nav-link">Agents</a>
  </aside>

  <div class="main-area">

    <div class="topbar">
      <div>
        <div class="topbar-title">Add Customer</div>
        <div class="topbar-subtitle">
          Create a new customer profile for the brokerage system
        </div>
      </div>
    </div>

    <main class="page-content">
      <div class="card">
        <div class="page-header">
          <div>
            <h2>New Customer</h2>
            <p>Enter the account details below to create a new customer record.</p>
          </div>
        </div>

        <div th:if="${param.error}" class="alert-error" th:text="${param.error}"></div>

        <form action="/customers/new" method="post">
          <div class="form-grid">
            <div class="form-group">
              <label>Account Number</label>
              <input class="form-input" type="text" name="accountNumber" placeholder="ACC1004" required>
            </div>

            <div class="form-group">
              <label>Email</label>
              <input class="form-input" type="email" name="email" placeholder="jane.doe@gmail.com" required>
            </div>

            <div class="form-group">
              <label>First Name</label>
              <input class="form-input" type="text" name="firstName" placeholder="Jane" required>
            </div>

            <div class="form-group">
              <label>Last Name</label>
              <input class="form-input" type="text" name="lastName" placeholder="Doe" required>
            </div>
          </div>

          <div class="action-row">
            <button type="submit" class="btn">Create Customer</button>
            <a th:href="@{/customers}" class="btn btn-secondary">Back to Customer List</a>
          </div>
        </form>
      </div>
    </main>

  </div>

</div>

</body>
</html>
